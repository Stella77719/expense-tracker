const $=id=>document.getElementById(id); const td=()=>new Date().toISOString().slice(0,10); const mk=d=>{const x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")}; const yk=d=>String(new Date(d).getFullYear()); const fm=n=>Number(n||0).toFixed(2); const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7); const cs=c=>(CUR[c]||CUR.CNY).symbol; const fa=(a,c)=>cs(c)+fm(a); const base=v=>"¥"+fm(v); const ymNow=()=>mk(new Date());
function h(tag,attrs,...kids){const el=document.createElement(tag); let pendingValue; if(attrs)for(const[k,v]of Object.entries(attrs)){if(v===false||v==null)continue; if(k==="className")el.className=v; else if(k==="style"&&typeof v==="object")Object.assign(el.style,v); else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v); else if(k==="disabled"){if(v)el.setAttribute("disabled","");} else if(k==="value"){pendingValue=String(v);} else if(k==="checked"){el.checked=!!v;} else el.setAttribute(k,v)} kids.flat(Infinity).forEach(c=>{if(c==null||c===false)return; el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)}); if(pendingValue!==undefined){el.value=pendingValue;} return el} function gap(n){return h("div",{style:{height:n+"px"}})}

function calcMoneyExpr(v){
  let raw=String(v==null?"":v).trim();
  if(!raw)return NaN;
  raw=raw.replace(/，/g,".").replace(/（/g,"(").replace(/）/g,")").replace(/×/g,"*").replace(/÷/g,"/").replace(/＋/g,"+").replace(/－/g,"-").replace(/\s+/g,"");
  if(!/^[0-9+\-*/().]+$/.test(raw))return NaN;
  if(/[+\-*/]{2,}/.test(raw.replace(/\(-/g,"(")))return NaN;
  try{const n=Function('"use strict";return ('+raw+')')();return Number.isFinite(n)?Number(n):NaN}catch(e){return NaN}
}
function moneyValue(v){const n=calcMoneyExpr(v);return Number.isFinite(n)?Number(n.toFixed(2)):NaN}
function sameEntry(a,b){return (a.type||"expense")===(b.type||"expense") && (a.date||"")===(b.date||"") && (a.currency||"CNY")===(b.currency||"CNY") && (a.category||"other")===(b.category||"other") && String(a.desc||"").trim().toLowerCase()===String(b.desc||"").trim().toLowerCase()}
function mergeNote(oldNote,extra){return [oldNote,extra].filter(Boolean).join("；")}

function load(){try{const d=localStorage.getItem(SK); if(!d)return def(); const p=JSON.parse(d); return {...def(),...p,categories:p.categories&&p.categories.length?p.categories:DEF_CATS.map(x=>({...x})),merchantRules:p.merchantRules||[],entries:(p.entries||[]).map(normalizeEntry),ratesToCNY:{...DEFAULT_RATES,...(p.ratesToCNY||{})}}}catch(e){return def()}} function def(){return{entries:[],budget:10000,categories:DEF_CATS.map(x=>({...x})),merchantRules:[],ratesToCNY:{...DEFAULT_RATES},ratesUpdatedAt:null}} function save(){localStorage.setItem(SK,JSON.stringify(S.data))}
function rate(c){return (S.data.ratesToCNY||DEFAULT_RATES)[c]||1} function refundBase(e){const cur=e.refundCurrency||e.currency||"CNY";return Number(((Number(e.refundAmount)||0)*rate(cur)).toFixed(2))} function grossBase(e){return Number((e.amountBase!=null?e.amountBase:(Number(e.amount)||0)*rate(e.currency||"CNY")).toFixed(2))} function amountBase(e){const g=grossBase(e); return Number(((e.type||"expense")==="expense"?Math.max(0,g-refundBase(e)):g).toFixed(2))} function netAmount(e){return Number(Math.max(0,(Number(e.amount)||0)-(Number(e.refundAmount)||0)).toFixed(2))} function hasRefund(e){return (Number(e.refundAmount)||0)>0} function isIncome(e){return (e.type||"expense")==="income"} function expenseOnly(es){return es.filter(e=>!isIncome(e))} function incomeOnly(es){return es.filter(isIncome)} function sumBase(es){return es.reduce((s,e)=>s+amountBase(e),0)} function normalizeEntry(e){const cur=e.currency||"CNY",amt=Number(e.amount||0),ref=Number(e.refundAmount||0);return{id:e.id||uid(),desc:e.desc||e.merchant||"未命名",amount:Number(amt.toFixed(2)),currency:cur,amountBase:e.amountBase!=null?Number(e.amountBase):Number((amt*(DEFAULT_RATES[cur]||1)).toFixed(2)),refundAmount:Number(ref.toFixed(2)),refundCurrency:e.refundCurrency||cur,category:e.category||"other",date:e.date||td(),ts:e.ts||Date.now(),note:e.note||"",source:e.source||"manual",type:e.type||"expense"}} function makeEntry(desc,amt,cat,cur,date,note="",source="manual",type="expense",refundAmount=0){const a=Number(amt), r=Number(refundAmount)||0, cc=cur||"CNY";return{id:uid(),desc:desc||"未命名",amount:Number(a.toFixed(2)),currency:cc,amountBase:Number((a*rate(cc)).toFixed(2)),refundAmount:Number(r.toFixed(2)),refundCurrency:cc,category:cat||"other",date:date||td(),ts:Date.now(),note,source,type}}
