function h(tag,attrs,...kids){const el=document.createElement(tag);let pv;if(attrs)for(const[k,v]of Object.entries(attrs)){if(v===false||v==null)continue;if(k==="className")el.className=v;else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="disabled"){if(v)el.setAttribute("disabled","");}else if(k==="value"){pv=String(v);}else if(k==="checked"){el.checked=!!v;}else el.setAttribute(k,v)}kids.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)});if(pv!==undefined)el.value=pv;return el}function gap(n){return h("div",{style:{height:n+"px"}})}
