<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="记账本">
<title>记账本 - 多币种汇率版</title>
<style>
:root{
  --cream:#FAF7F2;--cream-dark:#F0EBE3;--cream-deep:#E8E0D4;
  --blue-1:#E8F2FA;--blue-2:#C5DDEF;--blue-3:#89BBD9;--blue-4:#5A9EC4;--blue-5:#3B7FA8;--blue-6:#2A6080;
  --ink:#2C3E50;--ink-light:#5D7285;--ink-faint:#8FA3B3;
  --red:#D4726A;--green:#6AB08B;--amber:#D4A53C;
  --card:rgba(255,255,255,.72);--card-solid:#FFF;
  --shadow:0 2px 16px rgba(42,96,128,.06);
  --r:18px;--rs:12px;
  --fc:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;--fe:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fc);background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,var(--blue-1) 0%,transparent 50%),radial-gradient(circle at 80% 80%,var(--blue-1) 0%,transparent 40%);pointer-events:none;z-index:0}
#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;z-index:1}
.ct{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 90px;scroll-behavior:smooth}
.ct::-webkit-scrollbar{display:none}
.hd{padding:20px 20px 22px;background:linear-gradient(135deg,var(--blue-5),var(--blue-4) 40%,var(--blue-3));border-radius:0 0 28px 28px;color:#fff;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(58,127,168,.25)}
.hd::after{content:'';position:absolute;top:-40px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08)}
.hd::before{content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.cd{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.5)}
.cd+.cd{margin-top:12px}
.ct-t{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:6px}
input,textarea,select{font-family:var(--fc);border:1.5px solid var(--cream-deep);border-radius:var(--rs);padding:10px 14px;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--card-solid);color:var(--ink);width:100%}
input:focus,textarea:focus{border-color:var(--blue-3);box-shadow:0 0 0 3px rgba(137,187,217,.15)}
textarea{resize:vertical;min-height:100px;line-height:1.7}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.btn{border:none;border-radius:var(--rs);padding:11px 20px;font-family:var(--fc);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.bp{background:linear-gradient(135deg,var(--blue-5),var(--blue-4));color:#fff;box-shadow:0 4px 14px rgba(58,127,168,.25)}
.bp:active{transform:scale(.97)}.bp:disabled{background:var(--cream-deep);color:var(--ink-faint);box-shadow:none;cursor:default}
.bs{background:linear-gradient(135deg,var(--green),#5A9E7A);color:#fff}
.bg{background:transparent;color:var(--ink-light);border:1.5px solid var(--cream-deep)}
.bw{width:100%}
.bsm{padding:7px 14px;font-size:13px;border-radius:10px}
.cp{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .15s;border:1.5px solid var(--cream-deep);background:var(--card-solid);color:var(--ink-light)}
.cp.a{border-color:var(--blue-3);background:var(--blue-1);color:var(--blue-5);font-weight:500}
.cup{display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border-radius:20px;font-size:14px;cursor:pointer;transition:all .15s;border:2px solid var(--cream-deep);background:var(--card-solid);color:var(--ink-light);font-weight:600}
.cup.a{border-color:var(--blue-4);background:var(--blue-1);color:var(--blue-5)}
.er{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cream-dark)}
.er:last-child{border-bottom:none}
.ei{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.ef{flex:1;min-width:0}
.ed{font-size:14px;color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.em{font-size:11px;color:var(--ink-faint);margin-top:1px}
.ea{font-size:15px;font-weight:600;color:var(--red);font-family:var(--fe);flex-shrink:0}
.ex{background:none;border:none;font-size:18px;color:var(--cream-deep);cursor:pointer;padding:4px}
.ex:active{color:var(--red)}
.mbt{height:7px;background:var(--cream-dark);border-radius:4px;overflow:hidden;flex:1}
.mbf{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.si{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--rs);margin-bottom:8px;cursor:pointer;transition:all .15s;border:1.5px solid var(--cream-deep);background:var(--card-solid)}
.si.sel{border-color:var(--green);background:#F0FAF4}
.sc{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;border:2px solid var(--cream-deep);font-size:13px;color:#fff;flex-shrink:0;transition:all .15s}
.si.sel .sc{background:var(--green);border-color:var(--green)}
.rt{width:100%;border-collapse:separate;border-spacing:0}
.rt th{font-size:11px;font-weight:500;color:var(--ink-faint);text-align:left;padding:8px 10px;border-bottom:1.5px solid var(--cream-deep);text-transform:uppercase;letter-spacing:.5px;font-family:var(--fe)}
.rt th:last-child,.rt td:last-child{text-align:right}
.rt td{font-size:13px;padding:10px;border-bottom:1px solid var(--cream-dark);color:var(--ink)}
.rt tr:last-child td{border-bottom:none}
.rt .tr td{font-weight:700;border-top:2px solid var(--blue-3);color:var(--blue-6)}
.bc{display:flex;align-items:flex-end;gap:4px;height:110px;padding-top:10px}
.bcl{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.br{width:100%;max-width:22px;border-radius:5px 5px 0 0;min-height:3px;transition:height .4s cubic-bezier(.4,0,.2,1)}
.bl{font-size:8px;color:var(--ink-faint);font-family:var(--fe)}
.bv{font-size:8px;color:var(--ink-light);font-family:var(--fe);font-weight:500}
.sb{display:flex;height:26px;border-radius:8px;overflow:hidden}
.sb>div{transition:width .5s;display:flex;align-items:center;justify-content:center;font-size:11px}
.lg{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-light)}
.ld{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.tabs{display:flex;gap:4px;background:var(--cream-dark);border-radius:12px;padding:3px;margin-bottom:14px}
.tab{flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .2s;color:var(--ink-light);border:none;background:none;font-family:var(--fc)}
.tab.a{background:var(--card-solid);color:var(--blue-5);box-shadow:0 2px 8px rgba(0,0,0,.06);font-weight:600}
.bn{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--cream-deep);display:flex;justify-content:space-around;padding:6px 0 max(10px,env(safe-area-inset-bottom));z-index:100}
.nb{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;padding:4px 10px;font-family:var(--fc)}
.ni{font-size:21px;transition:transform .15s}.nb.a .ni{transform:scale(1.1)}
.nl{font-size:10px;color:var(--ink-faint)}.nb.a .nl{color:var(--blue-5);font-weight:600}
.fl{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(106,176,139,.35);animation:fi .25s ease-out}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.smb{background:linear-gradient(135deg,var(--blue-4),var(--blue-3));border-radius:var(--r);padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;color:#fff;box-shadow:0 4px 20px rgba(89,158,196,.2);transition:transform .15s}
.smb:active{transform:scale(.98)}
.hw{background:var(--blue-1);border-radius:var(--rs);padding:14px 16px;border:1px solid var(--blue-2)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sx{background:var(--cream);border-radius:var(--rs);padding:14px 16px;text-align:center;border:1px solid var(--cream-deep)}
.sl{font-size:11px;color:var(--ink-faint);margin-bottom:4px}
.sv{font-size:20px;font-weight:700;font-family:var(--fe)}
.rp{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.pa{background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink-light);padding:4px 8px}
.pl{font-size:15px;font-weight:600;color:var(--ink);flex:1;text-align:center;font-family:var(--fe)}
.ey{text-align:center;padding:28px 0;color:var(--ink-faint);font-size:13px}
.fi{animation:fd .3s ease-out}@keyframes fd{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cb{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px;font-family:var(--fe)}
.cn{background:#E8F2FA;color:var(--blue-5)}.cc{background:#FFF3E0;color:#D4885A}
/* Settings */
.set-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--rs);border:1px solid var(--cream-deep);margin-bottom:8px;background:var(--card-solid)}
.set-icon{font-size:24px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-info{flex:1;min-width:0}
.set-name{font-size:14px;font-weight:600;color:var(--ink)}
.set-key{font-size:11px;color:var(--ink-faint);font-family:var(--fe)}
.set-del{background:none;border:none;font-size:14px;color:var(--ink-faint);cursor:pointer;padding:6px 8px;border-radius:8px}
.set-del:active{background:var(--red);color:#fff}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:200px;overflow-y:auto;margin-bottom:10px}
.emoji-btn{font-size:22px;padding:6px;border:none;background:none;cursor:pointer;border-radius:8px;transition:background .1s}
.emoji-btn:active{background:var(--blue-1)}
.emoji-btn.a{background:var(--blue-1);border:2px solid var(--blue-3)}
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.color-btn{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
.color-btn.a{border-color:var(--ink);transform:scale(1.15)}

.warn{background:#FFF8E7;border:1px solid #F0D48A;color:#7A5A12;border-radius:var(--rs);padding:12px 14px;font-size:12px;line-height:1.8;margin:12px 0}
.okbox{background:#F0FAF4;border:1px solid #B9E2CB;color:#315F48;border-radius:var(--rs);padding:12px 14px;font-size:12px;line-height:1.8;margin:12px 0}
.mini{font-size:11px;color:var(--ink-faint);line-height:1.7}
.codebox{font-family:var(--fe);background:rgba(255,255,255,.78);border:1px dashed var(--blue-3);border-radius:10px;padding:8px 10px;font-size:11px;color:var(--blue-6);word-break:break-all;margin-top:8px}

</style>
</head>
<body>
<div id="app"></div>
<script>
// ========== DEFAULT CATEGORIES ==========
const DEF_CATS=[
  {key:"food",label:"餐饮",icon:"🍜",color:"#D4726A"},
  {key:"transport",label:"交通",icon:"🚇",color:"#5A9EC4"},
  {key:"shopping",label:"购物",icon:"🛍️",color:"#D4A53C"},
  {key:"entertainment",label:"娱乐",icon:"🎬",color:"#9B7ED8"},
  {key:"housing",label:"住房",icon:"🏠",color:"#D4885A"},
  {key:"education",label:"教育",icon:"📚",color:"#3B7FA8"},
  {key:"health",label:"医疗",icon:"💊",color:"#C9688F"},
  {key:"jewelry",label:"首饰",icon:"💍",color:"#E0A458"},
  {key:"beauty",label:"美妆",icon:"💄",color:"#E88BA7"},
  {key:"social",label:"社交",icon:"🥂",color:"#7CB98F"},
  {key:"pets",label:"宠物",icon:"🐱",color:"#A0886E"},
  {key:"fitness",label:"运动",icon:"🏋️",color:"#56B6A6"},
  {key:"digital",label:"数码",icon:"📱",color:"#6A8DC4"},
  {key:"other",label:"其他",icon:"📦",color:"#8FA3B3"},
];

const EMOJIS=["🍜","🚇","🛍️","🎬","🏠","📚","💊","📦","💍","💄","🥂","🐱","🏋️","📱","☕","🎮","✈️","🎵","🌸","💻","👗","👠","💎","🎁","🧸","🍰","🚗","⛽","📖","🏥","🎓","🛒","🍷","🎭","🎨","🌍","💇","🧴","🪴","🐶"];
const COLORS=["#D4726A","#5A9EC4","#D4A53C","#9B7ED8","#D4885A","#3B7FA8","#C9688F","#E0A458","#E88BA7","#7CB98F","#A0886E","#56B6A6","#6A8DC4","#8FA3B3","#D45D5D","#45A089","#B8860B","#708090","#CD853F","#8B5CF6"];

const CURRENCIES=[
  {key:"CNY",label:"人民币",symbol:"¥",flag:"🇨🇳"},
  {key:"NOK",label:"挪威克朗",symbol:"kr",flag:"🇳🇴"},
  {key:"EUR",label:"欧元",symbol:"€",flag:"🇪🇺"},
  {key:"USD",label:"美元",symbol:"$",flag:"🇺🇸"},
  {key:"GBP",label:"英镑",symbol:"£",flag:"🇬🇧"},
  {key:"SEK",label:"瑞典克朗",symbol:"kr",flag:"🇸🇪"},
  {key:"DKK",label:"丹麦克朗",symbol:"kr",flag:"🇩🇰"},
  {key:"JPY",label:"日元",symbol:"¥",flag:"🇯🇵"},
  {key:"KRW",label:"韩元",symbol:"₩",flag:"🇰🇷"},
  {key:"CAD",label:"加元",symbol:"C$",flag:"🇨🇦"},
  {key:"AUD",label:"澳元",symbol:"A$",flag:"🇦🇺"},
  {key:"HKD",label:"港币",symbol:"HK$",flag:"🇭🇰"},
  {key:"SGD",label:"新加坡元",symbol:"S$",flag:"🇸🇬"}
];
const CUR=Object.fromEntries(CURRENCIES.map(c=>[c.key,c]));
const BASE_CURRENCY="CNY";
const DEFAULT_RATES_TO_CNY={CNY:1,NOK:0.67,EUR:7.85,USD:7.25,GBP:9.20,SEK:0.71,DKK:1.05,JPY:0.046,KRW:0.0053,CAD:5.30,AUD:4.75,HKD:0.93,SGD:5.38};
const RATE_SYMBOLS=CURRENCIES.map(c=>c.key).filter(k=>k!=="EUR").join(",");
const RATE_APIS=[
  "https://api.frankfurter.dev/v1/latest?base=EUR&symbols="+RATE_SYMBOLS,
  "https://api.frankfurter.app/latest?from=EUR&to="+RATE_SYMBOLS
];
function rateToCNY(cur){return (S&&S.data&&S.data.ratesToCNY&&S.data.ratesToCNY[cur])||DEFAULT_RATES_TO_CNY[cur]||1}
function amountBase(e){return Number((e.amountBase!=null?e.amountBase:(e.amount||0)*rateToCNY(e.currency||"CNY")).toFixed(2))}
function makeEntry(desc,amount,category,currency,date){
  const cur=currency||"CNY";
  const amt=Number(amount);
  return {id:uid(),desc:desc||"未知商户",amount:Number(amt.toFixed(2)),category:category||"other",currency:cur,amountBase:Number((amt*rateToCNY(cur)).toFixed(2)),date:date||td(),ts:Date.now()};
}
function formatBase(v){return "≈¥"+fm(Number(v||0))}
function rateStamp(){
  const t=S.data.ratesUpdatedAt;if(!t)return"未更新，使用内置参考汇率";
  const d=new Date(t);return"汇率更新时间："+d.toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
}
async function updateRates(silent=false){
  let lastErr=null;
  for(const url of RATE_APIS){
    try{
      const res=await fetch(url,{cache:"no-store"});
      if(!res.ok)throw new Error("rate api failed: "+res.status);
      const data=await res.json();
      const r=data.rates||{};if(!r.CNY)throw new Error("missing CNY rate");
      const out={CNY:1,EUR:Number(r.CNY)};
      for(const c of CURRENCIES){
        if(c.key==="CNY"||c.key==="EUR")continue;
        if(r[c.key])out[c.key]=Number((r.CNY/r[c.key]).toFixed(6));
      }
      S.data.ratesToCNY={...DEFAULT_RATES_TO_CNY,...out};
      S.data.ratesUpdatedAt=new Date().toISOString();
      S.data.entries=(S.data.entries||[]).map(e=>e.amountBase==null?{...e,amountBase:Number(((e.amount||0)*((S.data.ratesToCNY||{})[e.currency||"CNY"]||1)).toFixed(2))}:e);
      save();
      if(!silent)flash("✅ 汇率已更新");
      render();
      return true;
    }catch(e){lastErr=e;}
  }
  console.warn("rate update failed",lastErr);
  if(!silent)flash("⚠️ 汇率更新失败，已使用内置参考汇率");
  return false;
}
function autoUpdateRatesIfNeeded(){
  const last=S.data.ratesUpdatedAt?new Date(S.data.ratesUpdatedAt).getTime():0;
  if(!last||Date.now()-last>12*60*60*1000)updateRates(true);
}

const AUTO_RULES=[
  {p:/奶茶|咖啡|星巴克|瑞幸|麦当劳|肯德基|外卖|美团|饿了么|午餐|晚餐|早餐|火锅|烧烤|饭|面|菜|食堂|零食|水果|超市|便利店|餐厅|食品|JOKER|REMA|KIWI|MENY|COOP|BUNNPRIS|SPAR|EXTRA|NARVESEN|7-ELEVEN/i,c:"food"},
  {p:/地铁|公交|打车|滴滴|uber|加油|停车|高铁|火车|飞机|机票|油费|出租|铁路|航空|交通|RUTER|VY|FLYBUSSEN|CIRCLE\s*K|ESSO|SHELL/i,c:"transport"},
  {p:/淘宝|京东|拼多多|衣服|鞋|包|日用|天猫|商城|百货|H&M|ZARA|CUBUS|BIKBOK|STORMBERG/i,c:"shopping"},
  {p:/电影|游戏|KTV|演出|门票|旅游|酒店|民宿|景点|影院|票务/i,c:"entertainment"},
  {p:/房租|水电|物业|网费|维修|家具|装修|燃气|暖气/i,c:"housing"},
  {p:/学费|书|课程|培训|考试|文具|打印|教育|学校/i,c:"education"},
  {p:/医院|药|体检|看病|挂号|牙|诊所|健康/i,c:"health"},
  {p:/项链|戒指|手链|耳环|珠宝|首饰|钻石|黄金|银饰|手表|腕表/i,c:"jewelry"},
  {p:/化妆|护肤|口红|粉底|面膜|美甲|美容|香水|彩妆|眼霜|精华/i,c:"beauty"},
  {p:/聚餐|AA|请客|生日|派对|红包|礼金|份子钱|约会/i,c:"social"},
  {p:/猫粮|狗粮|宠物|猫砂|兽医/i,c:"pets"},
  {p:/健身|游泳|瑜伽|球|运动|跑步/i,c:"fitness"},
  {p:/手机|电脑|数码|苹果|apple|ipad|耳机/i,c:"digital"},

function detectCurrency(t){
  const s=String(t||"").toUpperCase();
  if(/人民币|RMB|CNY|￥|¥/.test(s))return "CNY";
  for(const c of ["NOK","EUR","USD","GBP","SEK","DKK","JPY","KRW","CAD","AUD","HKD","SGD"]){if(new RegExp("\\b"+c+"\\b").test(s))return c;}
  if(/€/.test(s))return "EUR";if(/\$|USD/.test(s))return "USD";if(/£/.test(s))return "GBP";if(/₩/.test(s))return "KRW";
  if(/\bKR\b|KRONER|KORT/.test(s))return "NOK";

function normalizeSmsText(text){
  return String(text||"")
    .replace(/\r/g,"\n")
    .replace(/[，]/g,",")
    .replace(/[。]/g,".")
    .replace(/\s+【/g,"\n【")
    .replace(/】\s+/g,"】\n")
    .trim();
}
function splitSmsBlocks(text){
  const clean=normalizeSmsText(text);
  if(!clean)return[];
  // 优先按空行切分；如果用户一次粘贴多条短信，也尽量按银行签名/短信开头切开
  let blocks=clean.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean);
  if(blocks.length<=1){
    blocks=clean.split(/(?=【[^】]{1,20}】)|(?=您的[^\n]{0,20}(?:信用卡|借记卡|账户|尾号))|(?=You\s+(?:paid|spent|used))/i)
      .map(x=>x.trim()).filter(Boolean);
  }
  return blocks.length?blocks:[clean];
}
function parseAmountCurrency(t){
  const patterns=[
    {re:/(?:NOK|kr)\s*([\d,]+(?:\.\d+)?)/i,cur:"NOK"},
    {re:/([\d,]+(?:\.\d+)?)\s*(?:NOK|kr)/i,cur:"NOK"},
    {re:/(?:EUR|€)\s*([\d,]+(?:\.\d+)?)/i,cur:"EUR"},
    {re:/([\d,]+(?:\.\d+)?)\s*(?:EUR|€)/i,cur:"EUR"},
    {re:/(?:USD|US\$|\$)\s*([\d,]+(?:\.\d+)?)/i,cur:"USD"},
    {re:/([\d,]+(?:\.\d+)?)\s*(?:USD|US\$)/i,cur:"USD"},
    {re:/(?:GBP|£)\s*([\d,]+(?:\.\d+)?)/i,cur:"GBP"},
    {re:/([\d,]+(?:\.\d+)?)\s*(?:GBP|£)/i,cur:"GBP"},
    {re:/(?:SEK)\s*([\d,]+(?:\.\d+)?)/i,cur:"SEK"},
    {re:/([\d,]+(?:\.\d+)?)\s*SEK/i,cur:"SEK"},
    {re:/(?:DKK)\s*([\d,]+(?:\.\d+)?)/i,cur:"DKK"},
    {re:/([\d,]+(?:\.\d+)?)\s*DKK/i,cur:"DKK"},
    {re:/(?:JPY|円)\s*([\d,]+(?:\.\d+)?)/i,cur:"JPY"},
    {re:/([\d,]+(?:\.\d+)?)\s*(?:JPY|円)/i,cur:"JPY"},
    {re:/(?:KRW|₩)\s*([\d,]+(?:\.\d+)?)/i,cur:"KRW"},
    {re:/([\d,]+(?:\.\d+)?)\s*(?:KRW|₩)/i,cur:"KRW"},
    {re:/(?:CAD|C\$)\s*([\d,]+(?:\.\d+)?)/i,cur:"CAD"},
    {re:/(?:AUD|A\$)\s*([\d,]+(?:\.\d+)?)/i,cur:"AUD"},
    {re:/(?:HKD|HK\$)\s*([\d,]+(?:\.\d+)?)/i,cur:"HKD"},
    {re:/(?:SGD|S\$)\s*([\d,]+(?:\.\d+)?)/i,cur:"SGD"},
    {re:/(?:人民币|RMB|CNY|¥|￥)\s*([\d,]+(?:\.\d+)?)/i,cur:"CNY"},
    {re:/(?:消费|支出|扣款|支取|付款|支付|交易金额|网上支付)[^\d]{0,12}([\d,]+(?:\.\d+)?)\s*元/i,cur:"CNY"},
    {re:/([\d,]+(?:\.\d+)?)\s*元/i,cur:"CNY"},
  ];
  for(const p of patterns){
    const flags=p.re.flags.includes("g")?p.re.flags:p.re.flags+"g";
    const matches=[...t.matchAll(new RegExp(p.re.source,flags))];
    for(const m of matches){
      const idx=m.index||0;
      const before=t.slice(Math.max(0,idx-12),idx);
      const after=t.slice(idx,Math.min(t.length,idx+28));
      if(/余额|额度|可用|available|balance/i.test(before+after))continue;
      const v=parseFloat(String(m[1]).replace(/,/g,""));
      if(v>0&&v<1000000)return{amount:Number(v.toFixed(2)),currency:p.cur};
    }
  }
  return null;
}
function parseMerchant(t){
  const patterns=[
    /(?:在|于)\s*([A-Za-z\u4e00-\u9fff][A-Za-z0-9\u4e00-\u9fff\s·\-\.]{1,30}?)(?:消费|支付|扣款|刷卡|交易)/i,
    /(?:向|至|付给|收款方)\s*([A-Za-z\u4e00-\u9fff][A-Za-z0-9\u4e00-\u9fff\s·\-\.]{1,30}?)(?:支付|消费|转账|付款)/i,
    /(?:商户|摘要|对方|交易对象|Merchant)[:：\s]*([^,，。！!\n]{2,30})/i,
    /(?:at|to)\s+([A-Za-z][A-Za-z0-9\s\-\.]{1,30})(?:\s+for|\s+NOK|\s+kr|\s+on|$)/i,
  ];
  for(const p of patterns){
    const m=t.match(p);
    if(m&&m[1])return m[1].trim().replace(/[,，。；;\s]+$/,"");
  }
  if(/网上支付/.test(t))return"网上支付";
  if(/Apple\s*Pay/i.test(t))return"Apple Pay";
  return"未知商户";
}
function parseSmsDate(t){
  const now=new Date();
  let m=t.match(/(20\d{2})[年\/\-.](\d{1,2})[月\/\-.](\d{1,2})[日号]?/);
  if(m)return`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;
  m=t.match(/(?:于|日期|on)?\s*(\d{1,2})[月\/\-.](\d{1,2})[日号]?/);
  if(m)return`${now.getFullYear()}-${m[1].padStart(2,"0")}-${m[2].padStart(2,"0")}`;
  m=t.match(/(\d{1,2})\/(\d{1,2})\/(20\d{2})/);
  if(m)return`${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
  return td();
}
function parseSMS(text){
  const R=[];
  for(const t of splitSmsBlocks(text)){
    // 明确收入/退款类默认跳过，避免把入账当支出
    if(/入账|存入|转入|收入|到账|退款|refund/i.test(t)&&!/消费|支付|支取|扣款|付款|paid|spent/i.test(t))continue;
    const ac=parseAmountCurrency(t);
    if(!ac)continue;
    const merchant=parseMerchant(t);
    const dateStr=parseSmsDate(t);
    R.push({
      amount:ac.amount,
      merchant,
      date:dateStr,
      category:autoCat(merchant+" "+t),
      currency:ac.currency,
      raw:t.slice(0,160)
    });
  }
  return R;
}

}

      if(confirm("确定清空所有记账数据？此操作不可恢复！")){S.data.entries=[];save();flash("已清空");render()}
    }},"清空所有记录")));
}

// ========== ACTIONS ==========
function doAdd(){
  const amt=Number(S.amount);if(!amt||isNaN(amt)||amt<=0)return;
  S.data.entries=[makeEntry(S.desc.trim()||"未命名",amt,S.category||autoCat(S.desc)||"other",S.currency,S.date||td()),...S.data.entries];
  save();S.desc="";S.amount="";S.date=td();S.category=null;flash("✅ 已记录");render();
}
function flash(msg){S.flash=msg;render();setTimeout(()=>{S.flash=null;render()},1300)}

parseFromUrlIfAny();
render();
autoUpdateRatesIfNeeded();
</script>
</body>
</html>
