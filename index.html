<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="记账本">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<title>记账本</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#FAF7F2;--cream-dark:#F0EBE3;--cream-deep:#E8E0D4;
  --blue-1:#E8F2FA;--blue-2:#C5DDEF;--blue-3:#89BBD9;--blue-4:#5A9EC4;--blue-5:#3B7FA8;--blue-6:#2A6080;
  --ink:#2C3E50;--ink-light:#5D7285;--ink-faint:#8FA3B3;
  --red:#D4726A;--green:#6AB08B;--amber:#D4A53C;
  --card:rgba(255,255,255,.72);--card-solid:#FFFFFF;
  --shadow:0 2px 16px rgba(42,96,128,.06);
  --radius:18px;--radius-sm:12px;
  --font-cn:'Noto Sans SC','PingFang SC',sans-serif;
  --font-en:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-cn);background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background-image:radial-gradient(circle at 20% 20%,var(--blue-1) 0%,transparent 50%),radial-gradient(circle at 80% 80%,var(--blue-1) 0%,transparent 40%);
  pointer-events:none;z-index:0}
#app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;z-index:1}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 90px;scroll-behavior:smooth}
.content::-webkit-scrollbar{display:none}
.header{padding:20px 20px 22px;background:linear-gradient(135deg,var(--blue-5) 0%,var(--blue-4) 40%,var(--blue-3) 100%);
  border-radius:0 0 28px 28px;color:#fff;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(58,127,168,.25)}
.header::after{content:'';position:absolute;top:-40px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08)}
.header::before{content:'';position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.card{background:var(--card);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius);
  padding:18px 20px;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.5)}
.card+.card{margin-top:12px}
.card-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:6px}
input,textarea,select{font-family:var(--font-cn);border:1.5px solid var(--cream-deep);border-radius:var(--radius-sm);
  padding:10px 14px;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;background:var(--card-solid);color:var(--ink);width:100%}
input:focus,textarea:focus{border-color:var(--blue-3);box-shadow:0 0 0 3px rgba(137,187,217,.15)}
textarea{resize:vertical;min-height:100px;line-height:1.7}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.btn{border:none;border-radius:var(--radius-sm);padding:11px 20px;font-family:var(--font-cn);font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--blue-5),var(--blue-4));color:#fff;box-shadow:0 4px 14px rgba(58,127,168,.25)}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{background:var(--cream-deep);color:var(--ink-faint);box-shadow:none;cursor:default}
.btn-success{background:linear-gradient(135deg,var(--green),#5A9E7A);color:#fff}
.btn-ghost{background:transparent;color:var(--ink-light);border:1.5px solid var(--cream-deep)}
.btn-block{width:100%}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:10px}
.cat-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;
  transition:all .15s;border:1.5px solid var(--cream-deep);background:var(--card-solid);color:var(--ink-light)}
.cat-pill.active{border-color:var(--blue-3);background:var(--blue-1);color:var(--blue-5);font-weight:500}
.cur-pill{display:inline-flex;align-items:center;gap:4px;padding:6px 16px;border-radius:20px;font-size:14px;cursor:pointer;
  transition:all .15s;border:2px solid var(--cream-deep);background:var(--card-solid);color:var(--ink-light);font-weight:600}
.cur-pill.active{border-color:var(--blue-4);background:var(--blue-1);color:var(--blue-5)}
.entry-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cream-dark);transition:background .15s}
.entry-row:last-child{border-bottom:none}
.entry-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.entry-info{flex:1;min-width:0}
.entry-desc{font-size:14px;color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-meta{font-size:11px;color:var(--ink-faint);margin-top:1px}
.entry-amount{font-size:15px;font-weight:600;color:var(--red);font-family:var(--font-en);flex-shrink:0}
.entry-del{background:none;border:none;font-size:18px;color:var(--cream-deep);cursor:pointer;padding:4px;transition:color .15s}
.entry-del:active{color:var(--red)}
.mini-bar-track{height:7px;background:var(--cream-dark);border-radius:4px;overflow:hidden;flex:1}
.mini-bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.sms-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;
  transition:all .15s;border:1.5px solid var(--cream-deep);background:var(--card-solid)}
.sms-item.selected{border-color:var(--green);background:#F0FAF4}
.sms-check{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--cream-deep);font-size:13px;color:#fff;flex-shrink:0;transition:all .15s}
.sms-item.selected .sms-check{background:var(--green);border-color:var(--green)}
.report-table{width:100%;border-collapse:separate;border-spacing:0}
.report-table th{font-size:11px;font-weight:500;color:var(--ink-faint);text-align:left;padding:8px 10px;
  border-bottom:1.5px solid var(--cream-deep);text-transform:uppercase;letter-spacing:.5px;font-family:var(--font-en)}
.report-table th:last-child,.report-table td:last-child{text-align:right}
.report-table td{font-size:13px;padding:10px;border-bottom:1px solid var(--cream-dark);color:var(--ink)}
.report-table tr:last-child td{border-bottom:none}
.report-table .total-row td{font-weight:700;border-top:2px solid var(--blue-3);color:var(--blue-6)}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:110px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-rect{width:100%;max-width:22px;border-radius:5px 5px 0 0;min-height:3px;transition:height .4s cubic-bezier(.4,0,.2,1)}
.bar-label{font-size:8px;color:var(--ink-faint);font-family:var(--font-en)}
.bar-val{font-size:8px;color:var(--ink-light);font-family:var(--font-en);font-weight:500}
.stacked-bar{display:flex;height:26px;border-radius:8px;overflow:hidden}
.stacked-bar>div{transition:width .5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;font-size:11px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-light)}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.tabs{display:flex;gap:4px;background:var(--cream-dark);border-radius:12px;padding:3px;margin-bottom:14px}
.tab{flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;
  transition:all .2s;color:var(--ink-light);border:none;background:none;font-family:var(--font-cn)}
.tab.active{background:var(--card-solid);color:var(--blue-5);box-shadow:0 2px 8px rgba(0,0,0,.06);font-weight:600}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--cream-deep);display:flex;justify-content:space-around;
  padding:6px 0 max(10px,env(safe-area-inset-bottom));z-index:100}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:1px;
  cursor:pointer;padding:4px 10px;font-family:var(--font-cn);position:relative}
.nav-icon{font-size:21px;transition:transform .15s}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.nav-label{font-size:10px;color:var(--ink-faint);transition:color .15s}
.nav-btn.active .nav-label{color:var(--blue-5);font-weight:600}
.flash{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:8px 24px;
  border-radius:24px;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(106,176,139,.35);animation:flashIn .25s ease-out}
@keyframes flashIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.sms-banner{background:linear-gradient(135deg,var(--blue-4) 0%,var(--blue-3) 100%);border-radius:var(--radius);padding:16px 18px;
  cursor:pointer;display:flex;align-items:center;gap:12px;color:#fff;box-shadow:0 4px 20px rgba(89,158,196,.2);transition:transform .15s}
.sms-banner:active{transform:scale(.98)}
.howto{background:var(--blue-1);border-radius:var(--radius-sm);padding:14px 16px;border:1px solid var(--blue-2)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-box{background:var(--cream);border-radius:var(--radius-sm);padding:14px 16px;text-align:center;border:1px solid var(--cream-deep)}
.stat-label{font-size:11px;color:var(--ink-faint);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:700;font-family:var(--font-en)}
.report-period{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.period-arrow{background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink-light);padding:4px 8px}
.period-label{font-size:15px;font-weight:600;color:var(--ink);flex:1;text-align:center;font-family:var(--font-en)}
.empty{text-align:center;padding:28px 0;color:var(--ink-faint);font-size:13px}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cur-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;margin-left:4px;font-family:var(--font-en)}
.cur-nok{background:#E8F2FA;color:var(--blue-5)}
.cur-cny{background:#FFF3E0;color:#D4885A}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ========== CONSTANTS ==========
const CATEGORIES=[
  {key:"food",label:"餐饮",icon:"🍜",color:"#D4726A"},
  {key:"transport",label:"交通",icon:"🚇",color:"#5A9EC4"},
  {key:"shopping",label:"购物",icon:"🛍️",color:"#D4A53C"},
  {key:"entertainment",label:"娱乐",icon:"🎬",color:"#9B7ED8"},
  {key:"housing",label:"住房",icon:"🏠",color:"#D4885A"},
  {key:"education",label:"教育",icon:"📚",color:"#3B7FA8"},
  {key:"health",label:"医疗",icon:"💊",color:"#C9688F"},
  {key:"other",label:"其他",icon:"📦",color:"#8FA3B3"},
];
const CAT=Object.fromEntries(CATEGORIES.map(c=>[c.key,c]));
const CURRENCIES=[{key:"CNY",label:"人民币",symbol:"¥",flag:"🇨🇳"},{key:"NOK",label:"挪威克朗",symbol:"kr",flag:"🇳🇴"}];
const CUR=Object.fromEntries(CURRENCIES.map(c=>[c.key,c]));

const AUTO_RULES=[
  {p:/奶茶|咖啡|星巴克|瑞幸|麦当劳|肯德基|外卖|美团|饿了么|午餐|晚餐|早餐|火锅|烧烤|饭|面|菜|食堂|零食|水果|超市|便利店|餐厅|食品/i,c:"food"},
  {p:/地铁|公交|打车|滴滴|uber|加油|停车|高铁|火车|飞机|机票|油费|出租|铁路|航空|交通/i,c:"transport"},
  {p:/淘宝|京东|拼多多|衣服|鞋|包|化妆|护肤|日用|数码|手机|电脑|天猫|苹果|apple|商城|百货/i,c:"shopping"},
  {p:/电影|游戏|KTV|演出|门票|旅游|酒店|民宿|景点|影院|票务/i,c:"entertainment"},
  {p:/房租|水电|物业|网费|维修|家具|装修|燃气|暖气/i,c:"housing"},
  {p:/学费|书|课程|培训|考试|文具|打印|教育|学校/i,c:"education"},
  {p:/医院|药|体检|看病|挂号|牙|诊所|健康/i,c:"health"},
];
function autoCat(d){for(const r of AUTO_RULES)if(r.p.test(d))return r.c;return"other";}

const SAMPLE_SMS=["【招商银行】您尾号8888的信用卡12月15日在星巴克消费人民币38.00元，当前可用额度52000.00元。","【建设银行】您尾号6666储蓄卡12月16日向美团外卖支付人民币45.50元，余额1234.56元。","【工商银行】您的账户于2025年12月17日在滴滴出行消费¥23.80，余额8888.00元。"];

function parseSMS(text){
  const results=[];const blocks=text.split(/\n{2,}|\r\n{2,}/);const parts=blocks.length>1?blocks:[text];
  for(const block of parts){const t=block.trim();if(!t)continue;let amount=null,merchant=null,dateStr=null;
    const aP=[/(?:金额|人民币|消费|支出|扣款|交易金额|付款)[^\d]*?([\d,]+\.?\d*)\s*元?/i,/[¥￥]\s*([\d,]+\.?\d*)/,/RMB\s*([\d,]+\.?\d*)/i,/([\d,]+\.?\d*)\s*元/];
    for(const p of aP){const m=t.match(p);if(m){const v=parseFloat(m[1].replace(/,/g,""));if(v>0&&v<1000000){amount=v;break;}}}
    const mP=[/(?:在|于|向|至|商户|摘要|对方|收款方|付给)[：:\s]*([^\d\s,，。！\n]{2,20})/,/(?:交易|消费|支付|购买)[^\d]*?(?:在|于|向)[：:\s]*([^\d\s,，。\n]{2,20})/];
    for(const p of mP){const m=t.match(p);if(m){merchant=m[1].trim().replace(/[，。、；]+$/,"");break;}}
    if(!merchant){const fb=t.match(/(?:消费|支付|扣款|交易)[^\n]*?(?:于|在)\s*([^\d\s,，。]{2,15})/);if(fb)merchant=fb[1].trim();}
    const dP=[/(\d{4})[年/\-.](\d{1,2})[月/\-.](\d{1,2})[日号]?/,/(\d{1,2})[月/](\d{1,2})[日号]?/];
    for(const p of dP){const m=t.match(p);if(m){if(m.length>=4)dateStr=`${m[1]}-${m[2].padStart(2,"0")}-${m[3].padStart(2,"0")}`;else if(m.length>=3){const y=new Date().getFullYear();dateStr=`${y}-${m[1].padStart(2,"0")}-${m[2].padStart(2,"0")}`;}break;}}
    if(amount)results.push({amount,merchant:merchant||"未知商户",date:dateStr||today(),category:autoCat(merchant||t),raw:t.slice(0,80)});
  }return results;
}

// ========== UTILS ==========
function today(){return new Date().toISOString().slice(0,10)}
function monthKey(d){const x=new Date(d);return`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}`}
function yearKey(d){return new Date(d).getFullYear().toString()}
function fm(n){return n.toFixed(2)}
function fmtDate(d){const x=new Date(d);return`${x.getMonth()+1}/${x.getDate()}`}
function fmtMonth(mk){const[y,m]=mk.split("-");return`${y}年${parseInt(m)}月`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function curSym(c){return CUR[c]?CUR[c].symbol:"¥"}
function fmtAmt(amount,currency){return curSym(currency)+fm(amount)}
const MCN=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

// ========== STORAGE ==========
const SK="expense-tracker-v3";
function loadData(){try{const d=localStorage.getItem(SK);return d?JSON.parse(d):{entries:[],budget:3000}}catch(e){return{entries:[],budget:3000}}}
function saveData(data){try{localStorage.setItem(SK,JSON.stringify(data))}catch(e){}}

// ========== STATE ==========
let S={
  data:loadData(), view:"home",
  desc:"",amount:"",date:today(),category:null,currency:"CNY",
  smsText:"",smsParsed:[],smsSelected:new Set(),
  editBudget:false,budgetInput:"",
  flash:null,
  reportTab:"month",reportMonth:monthKey(new Date()),reportYear:new Date().getFullYear().toString(),
};
function set(p){Object.assign(S,p);render()}
function save(){saveData(S.data)}

// ========== DOM HELPERS ==========
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v] of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  }
  for(const c of ch.flat(Infinity)){if(c==null||c===false)continue;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)}
  return el;
}
function gap(n){return h("div",{style:{height:n+"px"}})}

// ========== RENDER ==========
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  const{data,view}=S;
  const cm=monthKey(new Date());
  const mE=data.entries.filter(e=>monthKey(e.date)===cm);
  const tE=data.entries.filter(e=>e.date===today());

  // Group totals by currency
  function totals(entries){
    const t={};for(const e of entries){const c=e.currency||"CNY";t[c]=(t[c]||0)+e.amount;}return t;
  }
  const mTotals=totals(mE), tTotals=totals(tE);
  const budgetPct=S.data.budget>0?(mTotals.CNY||0)/S.data.budget:0;

  function fmtTotals(t){
    const parts=[];
    if(t.CNY)parts.push("¥"+fm(t.CNY));
    if(t.NOK)parts.push("kr"+fm(t.NOK));
    return parts.length?parts.join(" + "):"¥0.00";
  }

  // Flash
  if(S.flash)app.appendChild(h("div",{className:"flash"},S.flash));

  // Header
  app.appendChild(h("div",{className:"header"},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px",position:"relative",zIndex:"1"}},
      h("div",null,
        h("div",{style:{fontSize:"12px",opacity:".7",letterSpacing:"1.5px",fontFamily:"var(--font-en)",fontWeight:"300"}},"💰 记账本"),
        h("div",{style:{fontSize:"26px",fontWeight:"700",fontFamily:"var(--font-en)",marginTop:"4px",letterSpacing:"-0.5px"}},fmtTotals(mTotals)),
        h("div",{style:{fontSize:"11px",opacity:".6",marginTop:"2px"}},"本月支出"),
      ),
      h("div",{style:{textAlign:"right"}},
        h("div",{style:{fontSize:"11px",opacity:".6"}},"今日"),
        h("div",{style:{fontSize:"18px",fontWeight:"600",fontFamily:"var(--font-en)",marginTop:"2px"}},fmtTotals(tTotals)),
      ),
    ),
    h("div",{style:{position:"relative",zIndex:"1"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",opacity:".7",marginBottom:"5px"}},
        h("span",{style:{cursor:"pointer",borderBottom:"1px dashed rgba(255,255,255,.4)"},
          onClick:()=>set({editBudget:true,budgetInput:String(data.budget)})},"预算: ¥"+data.budget+" (CNY)"),
        h("span",{style:{color:budgetPct>1?"#ff8a80":budgetPct>.8?"#ffe082":"#a5d6a7"}},Math.round(budgetPct*100)+"%"),
      ),
      h("div",{style:{height:"5px",background:"rgba(255,255,255,.18)",borderRadius:"3px",overflow:"hidden"}},
        h("div",{style:{height:"100%",width:Math.min(budgetPct,1)*100+"%",borderRadius:"3px",transition:"width .6s",
          background:budgetPct>1?"var(--red)":budgetPct>.8?"var(--amber)":"var(--green)"}}),

function rMonth(el){
  const mk=S.reportMonth;
  const entries=S.data.entries.filter(e=>monthKey(e.date)===mk);

  // Group by currency
  const byCur={};for(const e of entries){const c=e.currency||"CNY";byCur[c]=(byCur[c]||0)+e.amount;}
  const totalParts=Object.entries(byCur).map(([c,v])=>curSym(c)+fm(v)).join(" + ")||"¥0.00";

  el.appendChild(h("div",{className:"report-period"},
    h("button",{className:"period-arrow",onClick:()=>{const[y,m]=mk.split("-").map(Number);set({reportMonth:m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,"0")}`})}},"‹"),
    h("div",{className:"period-label"},fmtMonth(mk)),
    h("button",{className:"period-arrow",onClick:()=>{const[y,m]=mk.split("-").map(Number);set({reportMonth:m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,"0")}`})}},"›"),
  ));

  const dn=new Date(mk.split("-")[0],mk.split("-")[1],0).getDate();
  const dp=mk===monthKey(new Date())?new Date().getDate():dn;

  el.appendChild(h("div",{className:"card"},
    h("div",{className:"stat-grid"},
      h("div",{className:"stat-box"},h("div",{className:"stat-label"},"总支出"),h("div",{className:"stat-value",style:{color:"var(--red)",fontSize:"16px"}},totalParts)),
      h("div",{className:"stat-box"},h("div",{className:"stat-label"},"笔数"),h("div",{className:"stat-value"},String(entries.length))),
      ...Object.entries(byCur).map(([c,v])=>
        h("div",{className:"stat-box"},h("div",{className:"stat-label"},"日均 ("+c+")"),h("div",{className:"stat-value"},curSym(c)+fm(dp>0?v/dp:0)))),
      h("div",{className:"stat-box"},h("div",{className:"stat-label"},"剩余预算(CNY)"),
        h("div",{className:"stat-value",style:{color:S.data.budget-(byCur.CNY||0)>=0?"var(--green)":"var(--red)"}},
          "¥"+fm(S.data.budget-(byCur.CNY||0)))),
    ),
  ));

  if(entries.length===0){el.appendChild(h("div",{className:"card"},h("div",{className:"empty"},"该月暂无数据")));return;}

  // Daily bar chart
  const dm={};for(const e of entries)dm[e.date]=(dm[e.date]||0)+e.amount;
  const days=Object.entries(dm).sort((a,b)=>a[0].localeCompare(b[0]));
  const mx=Math.max(...days.map(d=>d[1]));
  el.appendChild(gap(12));
  el.appendChild(h("div",{className:"card"},
    h("div",{className:"card-title"},"📈","每日消费"),
    h("div",{className:"bar-chart"},...days.map(([d,v])=>h("div",{className:"bar-col"},
      h("div",{className:"bar-val"},v>mx*.25?Math.round(v):""),
      h("div",{className:"bar-rect",style:{height:(v/mx*80)+"px",background:"linear-gradient(to top,var(--blue-5),var(--blue-3))"}}),
      h("div",{className:"bar-label"},fmtDate(d))))),
  ));

  // Category table
  const byCat={};for(const e of entries)byCat[e.category]=(byCat[e.category]||0)+e.amount;
  const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,e)=>s+e.amount,0);
  el.appendChild(gap(12));
  el.appendChild(h("div",{className:"card"},
    h("div",{className:"card-title"},"📊","分类明细"),
    h("div",{className:"stacked-bar"},...sorted.map(([k,v])=>h("div",{style:{width:(v/total*100)+"%",background:CAT[k].color,color:"#fff",fontWeight:"600"}},v/total>.08?CAT[k].icon:""))),
    h("div",{className:"legend"},...sorted.map(([k,v])=>h("div",{className:"legend-item"},h("span",{className:"legend-dot",style:{background:CAT[k].color}}),CAT[k].label+" "+Math.round(v/total*100)+"%"))),
    gap(12),
    h("table",{className:"report-table"},
      h("thead",null,h("tr",null,h("th",null,"分类"),h("th",null,"笔数"),h("th",null,"金额"))),
      h("tbody",null,
        ...sorted.map(([k,v])=>{const cnt=entries.filter(e=>e.category===k).length;
          return h("tr",null,h("td",null,CAT[k].icon+" "+CAT[k].label),h("td",null,String(cnt)),h("td",{style:{fontWeight:"600",fontFamily:"var(--font-en)"}},fm(v)))}),
        h("tr",{className:"total-row"},h("td",null,"合计"),h("td",null,String(entries.length)),h("td",null,totalParts)),
      )),
  ));

  // Currency breakdown table
  if(Object.keys(byCur).length>1){
    el.appendChild(gap(12));
    el.appendChild(h("div",{className:"card"},
      h("div",{className:"card-title"},"💱","币种明细"),
      h("table",{className:"report-table"},
        h("thead",null,h("tr",null,h("th",null,"币种"),h("th",null,"笔数"),h("th",null,"金额"))),
        h("tbody",null,...Object.entries(byCur).map(([c,v])=>{
          const cnt=entries.filter(e=>(e.currency||"CNY")===c).length;
          return h("tr",null,h("td",null,CUR[c].flag+" "+CUR[c].label),h("td",null,String(cnt)),
            h("td",{style:{fontWeight:"600",fontFamily:"var(--font-en)"}},curSym(c)+fm(v)))})),
      ),
    ));
  }
}

function rCat(el){
  const entries=S.data.entries;
  if(entries.length===0){el.appendChild(h("div",{className:"card"},h("div",{className:"empty"},"暂无数据")));return;}
  const total=entries.reduce((s,e)=>s+e.amount,0);
  const byCat={};for(const c of CATEGORIES)byCat[c.key]={amount:0,count:0};
  for(const e of entries){byCat[e.category].amount+=e.amount;byCat[e.category].count++;}
  const sorted=Object.entries(byCat).filter(x=>x[1].amount>0).sort((a,b)=>b[1].amount-a[1].amount);

  el.appendChild(h("div",{className:"card"},
    h("div",{className:"card-title"},"📊","全部分类汇总"),
    h("div",{className:"stacked-bar",style:{height:"30px",marginBottom:"2px"}},
      ...sorted.map(([k,v])=>h("div",{style:{width:(v.amount/total*100)+"%",background:CAT[k].color,color:"#fff",fontWeight:"600"}},v.amount/total>.08?CAT[k].icon:""))),
    h("div",{className:"legend"},...sorted.map(([k,v])=>h("div",{className:"legend-item"},
      h("span",{className:"legend-dot",style:{background:CAT[k].color}}),CAT[k].label+" "+Math.round(v.amount/total*100)+"%"))),
  ));

  for(const[k,v] of sorted){
    const c=CAT[k];const catE=entries.filter(e=>e.category===k).sort((a,b)=>b.date.localeCompare(a.date));
    const avg=v.count>0?v.amount/v.count:0;
    // Currency breakdown for this category
    const curBreak={};for(const e of catE){const cu=e.currency||"CNY";curBreak[cu]=(curBreak[cu]||0)+e.amount;}
    const curParts=Object.entries(curBreak).map(([cu,val])=>curSym(cu)+fm(val)).join(" + ");

    const byM={};for(const e of catE){const mk=monthKey(e.date);byM[mk]=(byM[mk]||0)+e.amount;}
    const mSorted=Object.entries(byM).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
    const mxM=Math.max(...mSorted.map(x=>x[1]),1);

    el.appendChild(gap(12));
    el.appendChild(h("div",{className:"card"},
      h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}},
        h("span",{style:{fontSize:"24px"}},c.icon),
        h("div",{style:{flex:"1"}},
          h("div",{style:{fontSize:"15px",fontWeight:"700"}},c.label),
          h("div",{style:{fontSize:"11px",color:"var(--ink-faint)"}},v.count+"笔 · 占比"+Math.round(v.amount/total*100)+"%")),
        h("div",{style:{fontSize:"18px",fontWeight:"700",color:"var(--red)",fontFamily:"var(--font-en)"}},curParts)),
      h("div",{className:"stat-grid",style:{marginBottom:mSorted.length>1?"14px":"0"}},
        h("div",{className:"stat-box"},h("div",{className:"stat-label"},"笔均"),h("div",{className:"stat-value",style:{fontSize:"16px"}},fm(avg))),
        h("div",{className:"stat-box"},h("div",{className:"stat-label"},"最近一笔"),h("div",{className:"stat-value",style:{fontSize:"14px"}},catE[0]?catE[0].date.slice(5):"-"))),
      mSorted.length>1?h("div",null,
        h("div",{style:{fontSize:"12px",color:"var(--ink-faint)",marginBottom:"6px"}},"近期月度趋势"),
        h("div",{className:"bar-chart",style:{height:"70px"}},...mSorted.map(([mk,val])=>h("div",{className:"bar-col"},
          h("div",{className:"bar-val"},val>0?Math.round(val):""),
          h("div",{className:"bar-rect",style:{height:(val/mxM*50)+"px",background:c.color}}),
          h("div",{className:"bar-label"},mk.slice(5)))))):null,
    ));
  }
}

function vList(el){
  const entries=S.data.entries;
  el.appendChild(h("div",{className:"card"},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
      h("div",{className:"card-title",style:{marginBottom:"0"}},"📋","全部明细"),
      h("span",{style:{fontSize:"12px",color:"var(--ink-faint)"}},"共 "+entries.length+" 笔")),
    entries.length===0?h("div",{className:"empty"},"还没有任何记录，去记一笔吧~")
    :h("div",null,...entries.slice(0,80).map(e=>{
      const c=CAT[e.category]||CAT.other;const cur=e.currency||"CNY";
      return h("div",{className:"entry-row"},
        h("div",{className:"entry-icon"},c.icon),
        h("div",{className:"entry-info"},
          h("div",{className:"entry-desc"},e.desc),
          h("div",{className:"entry-meta"},e.date+" · "+c.label,h("span",{className:"cur-badge cur-"+(cur==="NOK"?"nok":"cny")},cur))),
        h("div",{className:"entry-amount"},"-"+fmtAmt(e.amount,cur)),
        h("button",{className:"entry-del",onClick:()=>{S.data.entries=S.data.entries.filter(x=>x.id!==e.id);save();render()}},"×"),
      )})),
  ));
}

// ========== ACTIONS ==========
function doAdd(){
  const amt=Number(S.amount);if(!amt||isNaN(amt)||amt<=0)return;
  S.data.entries=[{id:uid(),desc:S.desc.trim()||"未命名",amount:Number(amt.toFixed(2)),
    category:S.category||autoCat(S.desc)||"other",currency:S.currency,date:S.date||today(),ts:Date.now()},
    ...S.data.entries];
  save();S.desc="";S.amount="";S.date=today();S.category=null;
  flash("✅ 已记录");render();
}
function flash(msg){S.flash=msg;render();setTimeout(()=>{S.flash=null;render()},1300)}

render();
</script>
</body>
</html>
