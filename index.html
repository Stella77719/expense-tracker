const $=id=>document.getElementById(id); const td=()=>new Date().toISOString().slice(0,10); const mk=d=>{const x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")}; const yk=d=>String(new Date(d).getFullYear()); const fm=n=>Number(n||0).toFixed(2); const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7); const cs=c=>(CUR[c]||CUR.CNY).symbol; const fa=(a,c)=>cs(c)+fm(a); const base=v=>"¥"+fm(v); const ymNow=()=>mk(new Date());
function h(tag,attrs,...kids){const el=document.createElement(tag); if(attrs)for(const[k,v]of Object.entries(attrs)){if(v===false||v==null)continue; if(k==="className")el.className=v; else if(k==="style"&&typeof v==="object")Object.assign(el.style,v); else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v); else if(k==="disabled"){if(v)el.setAttribute("disabled","");} else el.setAttribute(k,v)} kids.flat(Infinity).forEach(c=>{if(c==null||c===false)return; el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c)}); return el} function gap(n){return h("div",{style:{height:n+"px"}})}
function load(){try{const d=localStorage.getItem(SK); if(!d)return def(); const p=JSON.parse(d); return {...def(),...p,categories:p.categories&&p.categories.length?p.categories:DEF_CATS.map(x=>({...x})),entries:(p.entries||[]).map(normalizeEntry),ratesToCNY:{...DEFAULT_RATES,...(p.ratesToCNY||{})}}}catch(e){return def()}} function def(){return{entries:[],budget:10000,categories:DEF_CATS.map(x=>({...x})),ratesToCNY:{...DEFAULT_RATES},ratesUpdatedAt:null}} function save(){localStorage.setItem(SK,JSON.stringify(S.data))}
function rate(c){return (S.data.ratesToCNY||DEFAULT_RATES)[c]||1} function amountBase(e){return Number((e.amountBase!=null?e.amountBase:(Number(e.amount)||0)*rate(e.currency||"CNY")).toFixed(2))} function isIncome(e){return (e.type||"expense")==="income"} function expenseOnly(es){return es.filter(e=>!isIncome(e))} function incomeOnly(es){return es.filter(isIncome)} function sumBase(es){return es.reduce((s,e)=>s+amountBase(e),0)} function normalizeEntry(e){const cur=e.currency||"CNY",amt=Number(e.amount||0);return{id:e.id||uid(),desc:e.desc||e.merchant||"未命名",amount:Number(amt.toFixed(2)),currency:cur,amountBase:e.amountBase!=null?Number(e.amountBase):Number((amt*(DEFAULT_RATES[cur]||1)).toFixed(2)),category:e.category||"other",date:e.date||td(),ts:e.ts||Date.now(),note:e.note||"",source:e.source||"manual",type:e.type||"expense"}} function makeEntry(desc,amt,cat,cur,date,note="",source="manual",type="expense"){const a=Number(amt);return{id:uid(),desc:desc||"未命名",amount:Number(a.toFixed(2)),currency:cur||"CNY",amountBase:Number((a*rate(cur||"CNY")).toFixed(2)),category:cat||"other",date:date||td(),ts:Date.now(),note,source,type}}
let S={data:load(),view:"home",desc:"",amount:"",currency:"CNY",date:td(),category:"",note:"",smsText:"",smsParsed:[],smsSelected:new Set(),flash:"",reportTab:"month",reportMonth:ymNow(),reportYear:String(new Date().getFullYear()),filterText:"",filterCat:"",filterCur:"",newCatLabel:"",newCatIcon:"📦",newCatColor:"#8FA3B3",entryType:"expense",editBudget:false,budgetInput:""};
function cats(){return S.data.categories||DEF_CATS} function catMap(){return Object.fromEntries(cats().map(c=>[c.key,c]))} function autoCat(s){for(const[r,c] of AUTO_RULES)if(r.test(s||""))return c;return"other"} function curTotals(es){const t={}; es.forEach(e=>{const c=e.currency||"CNY";t[c]=(t[c]||0)+Number(e.amount||0)});return t} function curText(t){const arr=CURRENCIES.map(c=>c.key).filter(k=>t[k]).map(k=>fa(t[k],k)+" "+k); return arr.join(" + ")||"-"} function monthEntries(){return S.data.entries.filter(e=>mk(e.date)===S.reportMonth)} function thisMonth(){return S.data.entries.filter(e=>mk(e.date)===ymNow())} function todayEntries(){return S.data.entries.filter(e=>e.date===td())}

async function updateRates(silent=false){const symbols=CURRENCIES.map(c=>c.key).filter(k=>k!=="EUR").join(",");const urls=[`https://api.frankfurter.dev/v1/latest?base=EUR&symbols=${symbols}`,`https://api.frankfurter.app/latest?from=EUR&to=${symbols}`];for(const url of urls){try{const res=await fetch(url,{cache:"no-store"}); if(!res.ok)throw Error(res.status); const j=await res.json(); const r=j.rates||{}; if(!r.CNY)throw Error("missing CNY"); const out={CNY:1,EUR:Number(r.CNY)}; CURRENCIES.forEach(c=>{if(c.key!=="CNY"&&c.key!=="EUR"&&r[c.key])out[c.key]=Number((r.CNY/r[c.key]).toFixed(6))}); S.data.ratesToCNY={...DEFAULT_RATES,...out}; S.data.ratesUpdatedAt=new Date().toISOString(); S.data.entries=S.data.entries.map(e=>({...e,amountBase:Number((Number(e.amount||0)*((S.data.ratesToCNY||{})[e.currency||"CNY"]||1)).toFixed(2))})); save(); if(!silent)flash("✅ 汇率已更新并重算记录"); render(); return true}catch(e){console.warn(e)}} if(!silent)flash("⚠️ 汇率更新失败，使用内置汇率"); return false}
function parseFromUrl(){const q=new URLSearchParams(location.search);const sms=q.get("sms")||q.get("text"); if(sms){S.view="sms";S.smsText=decodeURIComponent(sms);S.smsParsed=parseSMS(S.smsText);S.smsSelected=new Set(S.smsParsed.map((_,i)=>i));}}
function cleanText(t){return String(t||"").replace(/\r/g,"\n").replace(/，/g,",").replace(/。/g,".").replace(/(?<=\d),(?=\d{2}\b)/g,".").trim()} function splitBlocks(t){const s=cleanText(t); if(!s)return[]; let blocks=s.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean); if(blocks.length<=1)blocks=s.split(/(?=【[^】]{1,20}】)|(?=您的[^\n]{0,20}(?:信用卡|借记卡|账户|尾号))|(?=Your card)|(?=Kort \*)/i).map(x=>x.trim()).filter(Boolean); return blocks.length?blocks:[s]}
function numVal(x){let v=String(x||"").trim().replace(/\s/g,""); if(v.includes(",")&&!v.includes("."))v=v.replace(",","."); else v=v.replace(/,/g,""); return parseFloat(v)}
function isBalanceAmount(t,idx,full){const before=t.slice(Math.max(0,idx-14),idx); return /余额|额度|可用|available|balance/i.test(before)||/余额|额度|可用|available|balance/i.test(full)}
function parseAmount(t){const P=[[/\b(NOK|EUR|USD|GBP|SEK|DKK|JPY|KRW|CAD|AUD|HKD|SGD)\s*([\d.,]+)\b/i,null],[/\b([\d.,]+)\s*(NOK|EUR|USD|GBP|SEK|DKK|JPY|KRW|CAD|AUD|HKD|SGD|kr)\b/i,null],[/(?:人民币|RMB|CNY|￥|¥)\s*([\d,]+(?:\.\d+)?)\s*元?/i,"CNY"],[/(?:消费|收入|支取|支付|扣款|付款|入账|存入|转入|收到|交易金额|charged|spent|brukt)[^\d]{0,18}([\d,]+(?:\.\d+)?)\s*元/i,"CNY"],[/([\d,]+(?:\.\d+)?)\s*元/i,"CNY"]]; for(const [re,fixed] of P){const ms=[...t.matchAll(new RegExp(re.source,re.flags.includes("g")?re.flags:re.flags+"g"))]; for(const m of ms){const idx=m.index||0; if(isBalanceAmount(t,idx,m[0]))continue; let cur=fixed, val; if(!fixed){ if(m[1]&&isNaN(Number(m[1].replace(',','.')))){cur=m[1].toUpperCase();val=m[2]} else {val=m[1];cur=(m[2]||"CNY").toUpperCase(); if(cur==="KR")cur="NOK"; if(cur==="kr".toUpperCase())cur="NOK"} } else val=m[1]; const a=numVal(val); if(a>0&&a<1000000)return{amount:Number(a.toFixed(2)),currency:cur}}} return null}
